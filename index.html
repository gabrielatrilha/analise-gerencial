<title>MAGNUM IMPORT — Dashboard Gerencial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.d{max-width:1200px;margin:0 auto;padding:20px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:1px}
.hdr .dt{opacity:.7;font-size:13px}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tb{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;user-select:none}
.tb:hover{background:rgba(255,255,255,.15)}
.tb.a{background:#2563eb;border-color:#2563eb}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kp{padding:18px;border-radius:10px}
.kp .lb{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.85;margin-bottom:6px}
.kp .vl{font-size:22px;font-weight:700}
.kp .sb{font-size:11px;opacity:.7;margin-top:6px}
.k1{background:linear-gradient(135deg,#1e40af,#2563eb)}
.k2{background:linear-gradient(135deg,#991b1b,#dc2626)}
.k3{background:linear-gradient(135deg,#166534,#16a34a)}
.k4{background:linear-gradient(135deg,#92400e,#d97706)}
.k5{background:linear-gradient(135deg,#4c1d95,#7c3aed)}
.k6{background:linear-gradient(135deg,#065f46,#059669)}
.sec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:18px;margin-bottom:16px}
.st{font-size:16px;font-weight:700;margin-bottom:14px}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.cb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px}
.cb h3{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-chart{display:flex;align-items:flex-end;gap:2px;height:180px;padding-top:10px}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-stack{display:flex;align-items:flex-end;gap:1px;height:160px}
.bar{min-width:12px;border-radius:2px 2px 0 0;position:relative}
.bar .bt{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;white-space:nowrap;opacity:.8}
.bar-label{font-size:9px;opacity:.6;margin-top:4px;text-align:center}
.line-chart{position:relative;height:180px;border-left:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:20px}
.line-row{display:flex;align-items:flex-end;height:160px;padding:0 4px;gap:2px;position:relative}
.line-labels{display:flex;gap:2px;padding:0 4px}
.line-labels span{flex:1;text-align:center;font-size:9px;opacity:.5}
.dot{width:6px;height:6px;border-radius:50%;position:absolute}
.legend{display:flex;gap:16px;margin-bottom:8px;font-size:11px}
.legend span{display:flex;align-items:center;gap:4px}
.legend .lc{width:12px;height:3px;border-radius:2px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cd{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;cursor:pointer;user-select:none}
.cd:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25)}
.cd .cn{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.cd .cv{font-size:18px;font-weight:700;margin-top:3px}
.cd .cs{font-size:10px;opacity:.6;margin-top:3px}
.cd.a{border-color:#2563eb;background:rgba(37,99,235,.15)}
.det{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:14px;margin-top:10px}
.stb{display:flex;gap:4px;margin-bottom:10px}
.st2{padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff;user-select:none}
.st2.a{background:#2563eb;border-color:#2563eb}
table{width:100%;border-collapse:collapse}
th,td{padding:7px 10px;text-align:left;font-size:12px;border-bottom:1px solid rgba(255,255,255,.06);color:#fff}
th{font-weight:600;opacity:.7;font-size:11px;text-transform:uppercase;border-bottom-color:rgba(255,255,255,.12)}
.r{text-align:right}
.exp{cursor:pointer;padding:8px 0;user-select:none}
.exp:hover{opacity:.85}
.aw{display:inline-block;font-size:10px;margin-right:6px}
.aw.o{transform:rotate(90deg)}
.ch{display:inline-block;padding:5px 12px;border-radius:4px;font-size:11px;cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);margin:2px;color:#fff;user-select:none}
.ch:hover{background:rgba(255,255,255,.15)}
.ch.a{background:#2563eb;border-color:#2563eb}
.bm{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:5px 14px;font-size:11px;color:#fff;cursor:pointer;margin-top:8px;display:inline-block}
.bm:hover{background:rgba(255,255,255,.15)}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.cr{grid-template-columns:1fr}.g3,.g4{grid-template-columns:repeat(2,1fr)}}

details summary.st{cursor:pointer;user-select:none}
details summary.st::marker{content:''}
details summary.st::before{content:'\25B6 ';font-size:10px;margin-right:6px;display:inline-block;transition:transform .2s}
details[open] summary.st::before{transform:rotate(90deg)}
</style>
</head>

function makeLine(datasets,labels){

  h+='</div>';

  for(var i=0;i<labels.length;i++){
    var x=40+i*(650/(labels.length-1));
    h+='<text x="'+x+'" y="198" fill="rgba(255,255,255,.4)" font-size="9" text-anchor="middle">'+labels[i]+'</text>';

  // Lines
  datasets.forEach(function(ds){
    var pts=[];
    for(var i=0;i<ds.data.length;i++){
      if(ds.data[i]===null)continue;
      var x=40+i*(650/(labels.length-1));
      var y=180-(ds.data[i]/mx*160);

}
